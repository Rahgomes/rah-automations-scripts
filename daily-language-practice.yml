name: Daily Language Practice - $(Date:yyyyMMdd)$(Rev:r)

trigger: none

schedules:
  - cron: "0 12 * * *" # Diariamente às 12:00 PM UTC (equivalente a 9:00 AM America/Sao_Paulo)
    displayName: Daily Language Practice Schedule (9:00 AM BRT)
    branches:
      include:
        - main
    always: true

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: Telegram-Rah-Automation-Notifier-Credentials
  - group: LLM-Credentials

steps:
  - checkout: self
    displayName: "Checkout Automation Scripts"

  - script: |
      pip install -r requirements.txt
    displayName: "Install Python Dependencies"

  - script: |
      python3 -m scripts.daily_language_practice.main
    displayName: "Generate and Send Daily Language Practice"
    env:
      TELEGRAM_BOT_TOKEN: $(TELEGRAM_BOT_TOKEN)
      TELEGRAM_CHAT_ID: $(TELEGRAM_CHAT_ID)
      GROQ_API_KEY: $(GROK_API_KEY)
      GEMINI_API_KEY: $(GEMINI_API_KEY)
