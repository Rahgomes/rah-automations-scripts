name: Database Backup - $(Date:yyyyMMdd)$(Rev:r)

trigger: none
pr: none

schedules:
  - cron: "0 6 * * *"
    displayName: "Daily 03:00 America/Sao_Paulo (06:00 UTC)"
    branches:
      include:
        - main
    always: true

pool:
  name: rah-self-hosted

variables:
  - group: Telegram-Rah-Automation-Notifier-Credentials
  - group: Database-Backup-Credentials

steps:
  - checkout: self
    displayName: "Checkout automation scripts"

  - script: |
      python3 --version
    displayName: "Verify Python version"

  - script: |
      set -euo pipefail
      if ! command -v pg_dump >/dev/null 2>&1; then
        echo "pg_dump not found on agent — installing postgresql-client-16"
        sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        sudo apt-get update
        sudo apt-get install -y postgresql-client-16
      fi
      pg_dump --version
      psql --version
    displayName: "Ensure postgresql-client-16 is available"

  - script: |
      set -euo pipefail
      python3 -m pip install --upgrade pip
      python3 -m pip install -r requirements.txt
    displayName: "Install Python dependencies"

  - script: |
      python3 -m scripts.database_backup.main
    displayName: "Run database backup"
    env:
      TELEGRAM_BOT_TOKEN: $(TELEGRAM_BOT_TOKEN)
      TELEGRAM_CHAT_ID: $(TELEGRAM_CHAT_ID)
      PGHOST: $(PGHOST)
      PGPORT: $(PGPORT)
      PGUSER: $(PGUSER)
      PGPASSWORD: $(PGPASSWORD)
      PGDATABASES: $(PGDATABASES)
      PGDATABASES_EXCLUDE: $(PGDATABASES_EXCLUDE)
      MINIO_ENDPOINT: $(MINIO_ENDPOINT)
      MINIO_ACCESS_KEY: $(MINIO_ACCESS_KEY)
      MINIO_SECRET_KEY: $(MINIO_SECRET_KEY)
      MINIO_BUCKET: $(MINIO_BUCKET)
      MINIO_REGION: $(MINIO_REGION)
