name: Hostinger Status - $(Date:yyyyMMdd)$(Rev:r)

trigger: none
pr: none

schedules:
  - cron: "*/15 * * * *"
    displayName: "Every 15 minutes"
    branches:
      include:
        - main
    always: true

pool:
  name: rah-self-hosted

variables:
  - group: Telegram-Rah-Automation-Notifier-Credentials

steps:
  - checkout: self
    displayName: "Checkout automation scripts"

  - script: |
      set -euo pipefail
      python3 -m venv .venv
      source .venv/bin/activate
      pip install --upgrade pip
      pip install -r requirements.txt
    displayName: "Install Python dependencies"

  - script: |
      source .venv/bin/activate
      python3 -m scripts.hostinger_status.main
    displayName: "Run hostinger status check"
    env:
      TELEGRAM_BOT_TOKEN: $(TELEGRAM_BOT_TOKEN)
      TELEGRAM_CHAT_ID: $(TELEGRAM_CHAT_ID)
